<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWOT-spelet</title>
<script src="/socket.io/socket.io.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
}
button {
  cursor: pointer;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 1rem;
  font-weight: 600;
  transition: all .15s ease;
}
button:hover { filter: brightness(1.15); transform: translateY(-1px); }
button:active { transform: translateY(0); }
input[type="text"] {
  border: 2px solid #333;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 1.1rem;
  background: #1a1d27;
  color: #e0e0e0;
  outline: none;
  transition: border-color .2s;
  width: 100%;
}
input[type="text"]:focus { border-color: #5b8def; }

/* ===== Participant Page ===== */
#participant-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
#participant-page h1 {
  font-size: 2rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #27ae60, #2980b9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#participant-page .subtitle { color: #888; margin-bottom: 32px; }
#submit-form {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
#submit-btn {
  background: linear-gradient(135deg, #5b8def, #7c4dff);
  color: #fff;
}
#submit-btn:disabled { opacity: .5; cursor: not-allowed; filter: none; transform: none; }
#confirmation {
  margin-top: 16px;
  padding: 16px;
  border-radius: 8px;
  text-align: center;
  font-weight: 500;
  display: none;
}
#confirmation.success { display: block; background: #1b3a2d; color: #4ade80; border: 1px solid #27ae60; }
#confirmation.error { display: block; background: #3a1b1b; color: #f87171; border: 1px solid #e74c3c; }
#participant-timer {
  margin-bottom: 24px;
  font-size: 1.1rem;
  color: #aaa;
  min-height: 28px;
}

/* ===== Admin Page ===== */
#admin-page { display: none; padding: 20px; }
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid #222;
}
.admin-header h1 {
  font-size: 1.6rem;
  background: linear-gradient(135deg, #f39c12, #e74c3c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.admin-controls { display: flex; gap: 10px; flex-wrap: wrap; }
#start-btn { background: #27ae60; color: #fff; }
#stop-btn { background: #e74c3c; color: #fff; }
#export-btn { background: #2980b9; color: #fff; }

/* Top bar: QR + Timer + Stats in one compact row */
.admin-top {
  display: grid;
  grid-template-columns: auto auto 1fr 1fr 1fr 1fr;
  gap: 10px;
  align-items: stretch;
  margin-bottom: 16px;
}
.qr-panel {
  background: #1a1d27;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.qr-panel img { border-radius: 6px; width: 72px; height: 72px; }
.qr-panel .qr-url { font-size: .65rem; color: #888; margin-top: 4px; word-break: break-all; max-width: 90px; }

/* Timer — compact */
.timer-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #1a1d27;
  border-radius: 10px;
  padding: 8px 14px;
}
.timer-ring-wrap { position: relative; width: 64px; height: 64px; }
.timer-ring-wrap svg { transform: rotate(-90deg); width: 64px; height: 64px; }
.timer-ring-bg { fill: none; stroke: #2a2d37; stroke-width: 8; }
.timer-ring-fg { fill: none; stroke: #5b8def; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .9s linear, stroke .3s; }
.timer-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.timer-label { margin-top: 4px; color: #888; font-size: .7rem; }

/* Stats — inline with QR and timer */
.stat-card {
  background: #1a1d27;
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.stat-card .stat-num { font-size: 1.8rem; font-weight: 700; }
.stat-card .stat-lbl { font-size: .65rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.stat-s .stat-num { color: #27ae60; }
.stat-w .stat-num { color: #f39c12; }
.stat-o .stat-num { color: #2980b9; }
.stat-t .stat-num { color: #e74c3c; }

/* ===== Animation Panel ===== */
#animation-panel {
  background: #151820;
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: visible;
  position: relative;
  height: 520px;
  border: 1px solid #222;
}

/* --- Mailbox (center) --- */
.mailbox {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 5;
}
.mailbox-icon {
  width: 52px;
  height: 52px;
  background: #2a2d37;
  border: 2px solid #3a3d47;
  border-radius: 8px 8px 4px 4px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mailbox-icon::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 56px;
  height: 10px;
  background: #3a3d47;
  border-radius: 4px 4px 0 0;
}
.mailbox-flag {
  position: absolute;
  right: -10px;
  top: -4px;
  width: 6px;
  height: 20px;
  background: #e74c3c;
  border-radius: 2px;
  transition: background .3s;
}
.mailbox-flag.has-mail { background: #27ae60; }
.mailbox-flag::after {
  content: '';
  position: absolute;
  top: 0;
  left: 6px;
  width: 10px;
  height: 8px;
  background: inherit;
  border-radius: 0 2px 2px 0;
}
.mailbox-label {
  margin-top: 6px;
  font-size: 11px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Envelope stack in mailbox */
.envelope-stack {
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  position: absolute;
  bottom: 58px;
  gap: 2px;
}
.env-in-stack {
  width: 36px;
  height: 22px;
  background: #f5f5dc;
  border: 1px solid #ccc;
  border-radius: 2px;
  position: relative;
  animation: envDrop .3s ease;
}
.env-in-stack::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 10px solid #e8e0c8;
}
@keyframes envDrop {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Agent Home Base (corners) --- */
.agent-home {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
}
.agent-home.corner-tl { top: 50px; left: 60px; }
.agent-home.corner-tr { top: 50px; right: 60px; }
.agent-home.corner-bl { bottom: 30px; left: 60px; }
.agent-home.corner-br { bottom: 30px; right: 60px; }

.agent-counter {
  font-size: 1.4rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  margin-bottom: 4px;
  min-height: 24px;
}
.agent-label {
  font-size: 11px;
  color: #666;
  margin-top: 2px;
}

/* Agent character (pixel-art via CSS) */
.agent-char {
  width: 40px;
  height: 56px;
  position: relative;
}
.agent-char .a-body {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 28px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.agent-char .a-letter {
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  font-family: monospace;
}
.agent-char .a-head {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #ddd;
}
.agent-char .a-eye {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #222;
  top: 7px;
}
.agent-char .a-eye.left { left: 5px; }
.agent-char .a-eye.right { right: 5px; }
.agent-char .a-legs {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 14px;
}
.agent-char .a-leg {
  position: absolute;
  bottom: 0;
  width: 6px;
  height: 10px;
  border-radius: 0 0 2px 2px;
}
.agent-char .a-leg.left { left: 1px; }
.agent-char .a-leg.right { right: 1px; }
.agent-char .a-foot {
  position: absolute;
  bottom: 0;
  width: 8px;
  height: 4px;
  background: #333;
  border-radius: 1px;
}
.agent-char .a-foot.left { left: 0; }
.agent-char .a-foot.right { right: 0; }

/* Envelope stack at home base */
.home-stack {
  margin-top: 4px;
  width: 32px;
  height: 20px;
  position: relative;
  display: none;
}
.home-stack.has-mail { display: block; }
.home-stack-env {
  position: absolute;
  width: 32px;
  height: 18px;
  background: #f5f5dc;
  border: 1px solid #ccc;
  border-radius: 2px;
  bottom: 0;
}
.home-stack-env::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 8px solid #e8e0c8;
}
.home-stack-env:nth-child(2) { bottom: 3px; left: 2px; }
.home-stack-env:nth-child(3) { bottom: 6px; left: -1px; }

/* --- Walking Agent (animated clone) --- */
.walking-agent {
  position: absolute;
  z-index: 20;
  transition: none;
  pointer-events: none;
}
.walking-agent .a-leg.left,
.walking-agent .a-leg.right {
  animation: legSwing .3s ease-in-out infinite alternate;
}
.walking-agent .a-leg.right {
  animation-delay: .15s;
}
@keyframes legSwing {
  from { transform: rotate(-12deg); }
  to { transform: rotate(12deg); }
}
.walking-agent.face-left .agent-char {
  transform: scaleX(-1);
}

/* Carrying envelope */
.walking-env {
  position: absolute;
  top: 12px;
  width: 24px;
  height: 16px;
  background: #f5f5dc;
  border: 1px solid #ccc;
  border-radius: 2px;
}
.walking-agent.face-left .walking-env { right: -8px; }
.walking-agent:not(.face-left) .walking-env { left: 34px; }
.walking-env::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 7px solid #e8e0c8;
}

/* Feed */
.feed-panel {
  background: #1a1d27;
  border-radius: 12px;
  padding: 16px;
  max-height: 400px;
  overflow-y: auto;
}
.feed-panel h3 { margin-bottom: 12px; color: #aaa; }
.feed-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: #12141c;
  animation: feedIn .3s ease;
  transition: opacity .4s, transform .4s;
}
.feed-item.removing {
  opacity: 0;
  transform: translateX(30px) scale(.95);
}
@keyframes feedIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
.feed-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  font-weight: 800;
  font-size: .9rem;
  flex-shrink: 0;
  color: #fff;
}
.feed-badge.S { background: #27ae60; }
.feed-badge.W { background: #f39c12; }
.feed-badge.O { background: #2980b9; }
.feed-badge.T { background: #e74c3c; }
.feed-badge.pending { background: #555; }
.feed-text { flex: 1; font-size: .95rem; line-height: 1.4; }
.feed-sub { font-size: .75rem; color: #888; margin-top: 2px; }
.feed-empty { color: #555; text-align: center; padding: 40px; }

/* Session inactive overlay for participant */
.inactive-message {
  background: #1a1d27;
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  color: #888;
  font-size: 1.1rem;
}

/* Idle bob animation for agents at home */
@keyframes idleBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.agent-home .agent-char { animation: idleBob 2s ease-in-out infinite; }
.agent-home.corner-tr .agent-char { animation-delay: .5s; }
.agent-home.corner-bl .agent-char { animation-delay: 1s; }
.agent-home.corner-br .agent-char { animation-delay: 1.5s; }

/* Carrying bob animation */
@keyframes carryBob {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-4px) rotate(1deg); }
}
.walking-agent.carrying .agent-char {
  animation: carryBob .5s ease-in-out infinite;
}

/* Speech bubbles — works on both .agent-home and .walking-agent */
.speech-bubble {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #111;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 12px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  z-index: 50;
  animation: bubbleIn .3s ease forwards;
  pointer-events: none;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: #fff;
}
.speech-bubble.fade-out {
  animation: bubbleOut .4s ease forwards;
}
/* Don't flip the bubble text when agent faces left */
.walking-agent.face-left .speech-bubble {
  transform: translateX(-50%) scaleX(-1);
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateX(-50%) translateY(6px) scale(.8); }
  to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
@keyframes bubbleOut {
  from { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  to { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(.8); }
}

/* Mobile */
@media (max-width: 800px) {
  .admin-top { grid-template-columns: 1fr 1fr 1fr; }
  #animation-panel { height: 360px; }
  .agent-home.corner-tl, .agent-home.corner-tr { top: 40px; }
  .agent-home.corner-tl, .agent-home.corner-bl { left: 30px; }
  .agent-home.corner-tr, .agent-home.corner-br { right: 30px; }
}
</style>
</head>
<body>

<!-- ===== PARTICIPANT PAGE ===== -->
<div id="participant-page">
  <h1>SWOT Workshop</h1>
  <p class="subtitle">Dela din insikt</p>
  <div id="participant-timer"></div>
  <div id="inactive-msg" class="inactive-message" style="display:none;">
    Väntar på att sessionen ska starta...
  </div>
  <form id="submit-form" style="display:none;">
    <input type="text" id="answer-input" placeholder="Skriv din idé, styrka, svaghet, möjlighet eller hot..." maxlength="500" autocomplete="off" />
    <button type="submit" id="submit-btn">Skicka</button>
  </form>
  <div id="confirmation"></div>
</div>

<!-- ===== ADMIN PAGE ===== -->
<div id="admin-page">
  <div class="admin-header">
    <h1>SWOT-spelet — Admin</h1>
    <div class="admin-controls">
      <button id="start-btn">Starta session</button>
      <button id="stop-btn">Stoppa session</button>
      <button id="export-btn">Ladda ner Excel</button>
    </div>
  </div>

  <div class="admin-top">
    <div class="qr-panel">
      <img id="qr-img" alt="QR-kod" />
      <div class="qr-url" id="qr-url"></div>
    </div>
    <div class="timer-panel">
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 160 160">
          <circle class="timer-ring-bg" cx="80" cy="80" r="70" />
          <circle class="timer-ring-fg" id="timer-ring" cx="80" cy="80" r="70"
            stroke-dasharray="439.82" stroke-dashoffset="0" />
        </svg>
        <div class="timer-text" id="timer-display">--</div>
      </div>
      <div class="timer-label" id="timer-label">Väntar på första svaret</div>
    </div>
    <div class="stat-card stat-s"><div class="stat-num" id="count-s">0</div><div class="stat-lbl">Styrkor</div></div>
    <div class="stat-card stat-w"><div class="stat-num" id="count-w">0</div><div class="stat-lbl">Svagheter</div></div>
    <div class="stat-card stat-o"><div class="stat-num" id="count-o">0</div><div class="stat-lbl">Möjligheter</div></div>
    <div class="stat-card stat-t"><div class="stat-num" id="count-t">0</div><div class="stat-lbl">Hot</div></div>
  </div>

  <!-- Background music -->
  <audio id="bg-music" src="/audio/music.mp3" preload="auto"></audio>

  <!-- Animation Panel -->
  <div id="animation-panel">
    <!-- Agent S — top-left -->
    <div class="agent-home corner-tl" id="home-S">
      <div class="agent-counter" id="counter-S" style="color:#27ae60"></div>
      <div class="agent-char" id="char-S">
        <div class="a-head"><div class="a-eye left"></div><div class="a-eye right"></div></div>
        <div class="a-body" style="background:#27ae60"><span class="a-letter">S</span></div>
        <div class="a-legs">
          <div class="a-leg left" style="background:#27ae60"></div>
          <div class="a-leg right" style="background:#27ae60"></div>
          <div class="a-foot left"></div>
          <div class="a-foot right"></div>
        </div>
      </div>
      <div class="agent-label">Styrkor</div>
      <div class="home-stack" id="stack-S">
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
      </div>
    </div>

    <!-- Agent W — top-right -->
    <div class="agent-home corner-tr" id="home-W">
      <div class="agent-counter" id="counter-W" style="color:#f39c12"></div>
      <div class="agent-char" id="char-W">
        <div class="a-head"><div class="a-eye left"></div><div class="a-eye right"></div></div>
        <div class="a-body" style="background:#f39c12"><span class="a-letter">W</span></div>
        <div class="a-legs">
          <div class="a-leg left" style="background:#f39c12"></div>
          <div class="a-leg right" style="background:#f39c12"></div>
          <div class="a-foot left"></div>
          <div class="a-foot right"></div>
        </div>
      </div>
      <div class="agent-label">Svagheter</div>
      <div class="home-stack" id="stack-W">
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
      </div>
    </div>

    <!-- Agent O — bottom-left -->
    <div class="agent-home corner-bl" id="home-O">
      <div class="agent-counter" id="counter-O" style="color:#2980b9"></div>
      <div class="agent-char" id="char-O">
        <div class="a-head"><div class="a-eye left"></div><div class="a-eye right"></div></div>
        <div class="a-body" style="background:#2980b9"><span class="a-letter">O</span></div>
        <div class="a-legs">
          <div class="a-leg left" style="background:#2980b9"></div>
          <div class="a-leg right" style="background:#2980b9"></div>
          <div class="a-foot left"></div>
          <div class="a-foot right"></div>
        </div>
      </div>
      <div class="agent-label">Möjligheter</div>
      <div class="home-stack" id="stack-O">
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
      </div>
    </div>

    <!-- Agent T — bottom-right -->
    <div class="agent-home corner-br" id="home-T">
      <div class="agent-counter" id="counter-T" style="color:#e74c3c"></div>
      <div class="agent-char" id="char-T">
        <div class="a-head"><div class="a-eye left"></div><div class="a-eye right"></div></div>
        <div class="a-body" style="background:#e74c3c"><span class="a-letter">T</span></div>
        <div class="a-legs">
          <div class="a-leg left" style="background:#e74c3c"></div>
          <div class="a-leg right" style="background:#e74c3c"></div>
          <div class="a-foot left"></div>
          <div class="a-foot right"></div>
        </div>
      </div>
      <div class="agent-label">Hot</div>
      <div class="home-stack" id="stack-T">
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
        <div class="home-stack-env"></div>
      </div>
    </div>

    <!-- Center Mailbox -->
    <div class="mailbox" id="mailbox">
      <div class="envelope-stack" id="envelope-stack"></div>
      <div class="mailbox-icon">
        <div class="mailbox-flag" id="mailbox-flag"></div>
      </div>
      <div class="mailbox-label">Inkorg</div>
    </div>
  </div>

  <!-- Live Feed -->
  <div class="feed-panel">
    <h3>Inflöde</h3>
    <div id="feed-list"><div class="feed-empty">Inga svar ännu</div></div>
  </div>
</div>

<script>
// ===== Routing =====
const isAdmin = location.pathname.startsWith('/admin');
document.getElementById('admin-page').style.display = isAdmin ? 'block' : 'none';
document.getElementById('participant-page').style.display = isAdmin ? 'none' : 'flex';

const socket = io();

// ===== Shared State =====
let sessionActive = false;
let timerStarted = false;
let timeRemaining = 0;
let totalDuration = 150;
const counts = { S: 0, W: 0, O: 0, T: 0 };

// ===== PARTICIPANT LOGIC =====
if (!isAdmin) {
  const form = document.getElementById('submit-form');
  const input = document.getElementById('answer-input');
  const btn = document.getElementById('submit-btn');
  const conf = document.getElementById('confirmation');
  const inactiveMsg = document.getElementById('inactive-msg');
  const pTimer = document.getElementById('participant-timer');

  function updateParticipantUI() {
    if (!sessionActive) {
      form.style.display = 'none';
      inactiveMsg.style.display = 'block';
      pTimer.textContent = '';
    } else {
      inactiveMsg.style.display = 'none';
      const expired = timerStarted && timeRemaining <= 0;
      if (expired) {
        form.style.display = 'none';
        pTimer.textContent = 'Tiden är ute!';
        pTimer.style.color = '#e74c3c';
      } else {
        form.style.display = 'flex';
        if (timerStarted) {
          const m = Math.floor(timeRemaining / 60);
          const s = String(timeRemaining % 60).padStart(2, '0');
          pTimer.textContent = `Tid kvar: ${m}:${s}`;
          pTimer.style.color = timeRemaining <= 30 ? '#e74c3c' : '#aaa';
        } else {
          pTimer.textContent = '';
        }
      }
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    btn.disabled = true;
    conf.className = '';
    conf.style.display = 'none';
    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (res.ok) {
        conf.textContent = 'Inskickat! Du kan skicka ett till.';
        conf.className = 'success';
        input.value = '';
      } else {
        conf.textContent = data.error || 'Inskickning misslyckades';
        conf.className = 'error';
      }
    } catch {
      conf.textContent = 'Nätverksfel. Försök igen.';
      conf.className = 'error';
    }
    btn.disabled = false;
    input.focus();
  });

  socket.on('session:started', () => { sessionActive = true; timerStarted = false; conf.style.display = 'none'; updateParticipantUI(); });
  socket.on('session:stopped', () => { sessionActive = false; updateParticipantUI(); });
  socket.on('timer:started', (d) => { timerStarted = true; timeRemaining = d.timeRemaining; totalDuration = d.totalDuration; updateParticipantUI(); });
  socket.on('timer:tick', (d) => { timeRemaining = d.timeRemaining; updateParticipantUI(); });
  socket.on('timer:ended', () => { timeRemaining = 0; updateParticipantUI(); });
  socket.on('session:state', (s) => {
    sessionActive = s.active;
    timerStarted = s.timerStarted;
    timeRemaining = s.timeRemaining;
    totalDuration = s.totalDuration;
    updateParticipantUI();
  });
}

// ===== ADMIN LOGIC =====
if (isAdmin) {
  const startBtn = document.getElementById('start-btn');
  const stopBtn = document.getElementById('stop-btn');
  const exportBtn = document.getElementById('export-btn');
  const feedList = document.getElementById('feed-list');
  const timerDisplay = document.getElementById('timer-display');
  const timerRing = document.getElementById('timer-ring');
  const timerLabel = document.getElementById('timer-label');
  const circumference = 2 * Math.PI * 70;
  const panel = document.getElementById('animation-panel');
  const envelopeStack = document.getElementById('envelope-stack');
  const mailboxFlag = document.getElementById('mailbox-flag');

  const agentColors = { S: '#27ae60', W: '#f39c12', O: '#2980b9', T: '#e74c3c' };
  const agentCounts = { S: 0, W: 0, O: 0, T: 0 };
  let mailboxEnvelopes = 0; // track envelopes in the stack
  const activeWalkers = {}; // letter -> walker element, tracks walking agents
  const bgMusic = document.getElementById('bg-music');
  let musicPlayed = false;

  // Load QR code
  fetch('/api/qr').then(r => r.json()).then(d => {
    document.getElementById('qr-img').src = d.qr;
    document.getElementById('qr-url').textContent = d.url;
  });

  startBtn.onclick = () => fetch('/api/session/start', { method: 'POST' });
  stopBtn.onclick = () => fetch('/api/session/stop', { method: 'POST' });
  exportBtn.onclick = () => { window.location.href = '/api/export'; };

  function updateTimerUI() {
    if (!sessionActive) {
      timerDisplay.textContent = '--';
      timerRing.style.strokeDashoffset = '0';
      timerRing.style.stroke = '#5b8def';
      timerLabel.textContent = 'Session inaktiv';
      return;
    }
    if (!timerStarted) {
      timerDisplay.textContent = formatTime(totalDuration);
      timerRing.style.strokeDashoffset = '0';
      timerRing.style.stroke = '#5b8def';
      timerLabel.textContent = 'Väntar på första svaret';
      return;
    }
    timerDisplay.textContent = formatTime(timeRemaining);
    const pct = 1 - timeRemaining / totalDuration;
    timerRing.style.strokeDashoffset = String(pct * circumference);
    if (timeRemaining <= 0) {
      timerRing.style.stroke = '#e74c3c';
      timerLabel.textContent = 'Tiden är ute!';
    } else if (timeRemaining <= 30) {
      timerRing.style.stroke = '#e74c3c';
      timerLabel.textContent = 'Skynda!';
    } else {
      timerRing.style.stroke = '#5b8def';
      timerLabel.textContent = 'Timer igång';
    }
  }

  function formatTime(s) {
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function updateCounts() {
    document.getElementById('count-s').textContent = counts.S;
    document.getElementById('count-w').textContent = counts.W;
    document.getElementById('count-o').textContent = counts.O;
    document.getElementById('count-t').textContent = counts.T;
  }

  function updateAgentCounter(letter) {
    const el = document.getElementById('counter-' + letter);
    el.textContent = agentCounts[letter] > 0 ? agentCounts[letter] : '';
    const stack = document.getElementById('stack-' + letter);
    if (agentCounts[letter] > 0) {
      stack.classList.add('has-mail');
    } else {
      stack.classList.remove('has-mail');
    }
  }

  function addEnvelopeToMailbox() {
    mailboxEnvelopes++;
    const env = document.createElement('div');
    env.className = 'env-in-stack';
    envelopeStack.appendChild(env);
    mailboxFlag.classList.add('has-mail');
  }

  function removeEnvelopeFromMailbox() {
    if (mailboxEnvelopes <= 0) return;
    mailboxEnvelopes--;
    const last = envelopeStack.lastElementChild;
    if (last) last.remove();
    if (mailboxEnvelopes <= 0) {
      mailboxFlag.classList.remove('has-mail');
    }
  }

  // --- Feed ---
  function addFeedItem(id, text, classification) {
    const empty = feedList.querySelector('.feed-empty');
    if (empty) empty.remove();

    let existing = document.getElementById('feed-' + id);
    if (existing) {
      if (classification) {
        const badge = existing.querySelector('.feed-badge');
        badge.textContent = classification.swot;
        badge.className = 'feed-badge ' + classification.swot;
        const sub = existing.querySelector('.feed-sub');
        sub.textContent = classification.subcategory + (classification.reason ? ' — ' + classification.reason : '');
      }
      return;
    }

    const div = document.createElement('div');
    div.className = 'feed-item';
    div.id = 'feed-' + id;
    const badge = classification ? classification.swot : '?';
    const badgeClass = classification ? classification.swot : 'pending';
    const subText = classification ? classification.subcategory + (classification.reason ? ' — ' + classification.reason : '') : 'Klassificerar...';
    div.innerHTML = `<div class="feed-badge ${badgeClass}">${badge}</div><div><div class="feed-text">${escapeHtml(text)}</div><div class="feed-sub">${escapeHtml(subText)}</div></div>`;
    feedList.prepend(div);
  }

  function removeFeedItem(id) {
    const el = document.getElementById('feed-' + id);
    if (!el) return;
    el.classList.add('removing');
    setTimeout(() => {
      el.remove();
      if (!feedList.querySelector('.feed-item')) {
        feedList.innerHTML = '<div class="feed-empty">Inga svar ännu</div>';
      }
    }, 400);
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- Speech Bubbles ---
  function showSpeechBubble(agentLetter, text) {
    // Attach to walking agent if one exists, otherwise to home base
    const target = activeWalkers[agentLetter] || document.getElementById('home-' + agentLetter);
    if (!target) return;
    // Remove existing bubble on this target
    const existing = target.querySelector('.speech-bubble');
    if (existing) existing.remove();

    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble';
    bubble.textContent = text;
    bubble.dataset.agent = agentLetter;
    target.appendChild(bubble);

    // Fade out after 3.5s
    setTimeout(() => {
      if (bubble.parentNode) {
        bubble.classList.add('fade-out');
        setTimeout(() => bubble.remove(), 400);
      }
    }, 3500);
  }

  // Transfer speech bubble from home to walker or vice versa
  function transferBubble(agentLetter, fromEl, toEl) {
    const bubble = fromEl.querySelector(`.speech-bubble[data-agent="${agentLetter}"]`);
    if (bubble && toEl) {
      toEl.appendChild(bubble);
    }
  }

  // Idle chatter timer
  let lastSubmissionTime = Date.now();
  let idleTimer = null;
  const idleLines = [
    'Kaffe någon?', 'Sover de där ute?', 'Hej? Nån hemma?',
    'Lite tyst här...', 'Jag hinner med en fika!', '*gäspar*',
    'Vem beställde lunch?', 'Är det rast redan?',
  ];

  function resetIdleTimer() {
    lastSubmissionTime = Date.now();
    if (idleTimer) clearInterval(idleTimer);
    idleTimer = setInterval(() => {
      if (Date.now() - lastSubmissionTime >= 10000 && sessionActive && timeRemaining > 0) {
        const agents = ['S', 'W', 'O', 'T'];
        const agent = agents[Math.floor(Math.random() * agents.length)];
        const line = idleLines[Math.floor(Math.random() * idleLines.length)];
        showSpeechBubble(agent, line);
        lastSubmissionTime = Date.now(); // reset so next idle is 10s later
      }
    }, 5000);
  }
  resetIdleTimer();

  // Timer end lines
  const timerEndLines = {
    S: 'Bra jobbat allihopa!',
    W: 'Äntligen slut...',
    O: 'Det var produktivt!',
    T: 'Puh, det var intensivt!',
  };

  // --- Walking Animation ---
  const deliveryQueue = [];
  let delivering = false;

  function triggerDelivery(id, swotLetter) {
    deliveryQueue.push({ id, letter: swotLetter });
    processQueue();
  }

  function processQueue() {
    if (delivering || deliveryQueue.length === 0) return;
    delivering = true;
    const job = deliveryQueue.shift();
    animateAgentPickup(job.letter, job.id);
  }

  function animateAgentPickup(letter, submissionId) {
    const homeEl = document.getElementById('home-' + letter);
    const charEl = document.getElementById('char-' + letter);
    const mailbox = document.getElementById('mailbox');

    // Get positions
    const panelRect = panel.getBoundingClientRect();
    const charRect = charEl.getBoundingClientRect();
    const mailboxRect = mailbox.getBoundingClientRect();

    // Agent start position (relative to panel)
    const startX = charRect.left - panelRect.left;
    const startY = charRect.top - panelRect.top;

    // Mailbox center position
    const mailboxX = mailboxRect.left - panelRect.left + mailboxRect.width / 2 - 20;
    const mailboxY = mailboxRect.top - panelRect.top - 10;

    // Determine facing direction
    const goingRight = mailboxX > startX;

    // Hide original character during animation
    charEl.style.visibility = 'hidden';

    // Create walking clone
    const walker = document.createElement('div');
    walker.className = 'walking-agent' + (goingRight ? '' : ' face-left');
    walker.innerHTML = `
      <div class="agent-char">
        <div class="a-head"><div class="a-eye left"></div><div class="a-eye right"></div></div>
        <div class="a-body" style="background:${agentColors[letter]}"><span class="a-letter">${letter}</span></div>
        <div class="a-legs">
          <div class="a-leg left" style="background:${agentColors[letter]}"></div>
          <div class="a-leg right" style="background:${agentColors[letter]}"></div>
          <div class="a-foot left"></div>
          <div class="a-foot right"></div>
        </div>
      </div>
    `;
    walker.style.left = startX + 'px';
    walker.style.top = startY + 'px';
    panel.appendChild(walker);

    // Register walker so speech bubbles attach to it
    activeWalkers[letter] = walker;
    transferBubble(letter, homeEl, walker);

    // Slow strolling speed
    const walkDuration = 2800;

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function walkTo(targetX, targetY, duration, onDone) {
      const sx = parseFloat(walker.style.left);
      const sy = parseFloat(walker.style.top);
      const facingRight = targetX > sx;
      // Preserve carrying class if present
      const isCarrying = walker.classList.contains('carrying');
      walker.className = 'walking-agent' + (facingRight ? '' : ' face-left') + (isCarrying ? ' carrying' : '');
      const wStart = performance.now();
      function step(now) {
        const elapsed = now - wStart;
        const t = Math.min(elapsed / duration, 1);
        const e = easeInOut(t);
        walker.style.left = (sx + (targetX - sx) * e) + 'px';
        walker.style.top = (sy + (targetY - sy) * e) + 'px';
        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          onDone();
        }
      }
      requestAnimationFrame(step);
    }

    // Walk to mailbox
    walkTo(mailboxX, mailboxY, walkDuration, () => {
      // Pick up envelope
      removeEnvelopeFromMailbox();

      // Remove from feed
      removeFeedItem(submissionId);

      // Add envelope to walker and carrying bob
      const env = document.createElement('div');
      env.className = 'walking-env';
      walker.appendChild(env);
      walker.classList.add('carrying');

      // Phase 2: Walk back home
      const facingRight2 = startX > mailboxX;
      walker.className = 'walking-agent' + (facingRight2 ? '' : ' face-left') + ' carrying';

      setTimeout(() => {
        walkTo(startX, startY, walkDuration, () => {
          // Deliver
          agentCounts[letter]++;
          updateAgentCounter(letter);

          // Transfer any bubble back to home before removing walker
          transferBubble(letter, walker, homeEl);
          delete activeWalkers[letter];

          // Clean up
          walker.remove();
          charEl.style.visibility = 'visible';

          delivering = false;
          processQueue();
        });
      }, 300);
    });
  }

  // --- Socket events ---
  socket.on('session:state', (s) => {
    sessionActive = s.active;
    timerStarted = s.timerStarted;
    timeRemaining = s.timeRemaining;
    totalDuration = s.totalDuration;
    counts.S = 0; counts.W = 0; counts.O = 0; counts.T = 0;
    agentCounts.S = 0; agentCounts.W = 0; agentCounts.O = 0; agentCounts.T = 0;
    mailboxEnvelopes = 0;
    envelopeStack.innerHTML = '';
    mailboxFlag.classList.remove('has-mail');

    let unclassifiedCount = 0;
    s.submissions.forEach((sub) => {
      if (sub.classification) {
        counts[sub.classification.swot]++;
        agentCounts[sub.classification.swot]++;
        // Don't add classified items to feed (they've been picked up)
      } else {
        addFeedItem(sub.id, sub.text, null);
        unclassifiedCount++;
      }
    });
    // Add unclassified as envelopes
    for (let i = 0; i < unclassifiedCount; i++) addEnvelopeToMailbox();

    ['S','W','O','T'].forEach(l => updateAgentCounter(l));
    updateCounts();
    updateTimerUI();
  });

  socket.on('session:started', (d) => {
    sessionActive = true;
    timerStarted = false;
    timeRemaining = 0;
    totalDuration = d.totalDuration;
    feedList.innerHTML = '<div class="feed-empty">Inga svar ännu</div>';
    counts.S = 0; counts.W = 0; counts.O = 0; counts.T = 0;
    agentCounts.S = 0; agentCounts.W = 0; agentCounts.O = 0; agentCounts.T = 0;
    mailboxEnvelopes = 0;
    musicPlayed = false;
    resetIdleTimer();
    envelopeStack.innerHTML = '';
    mailboxFlag.classList.remove('has-mail');
    ['S','W','O','T'].forEach(l => updateAgentCounter(l));
    updateCounts();
    updateTimerUI();
  });

  socket.on('session:stopped', () => {
    sessionActive = false;
    updateTimerUI();
  });

  socket.on('timer:started', (d) => {
    timerStarted = true;
    timeRemaining = d.timeRemaining;
    totalDuration = d.totalDuration;
    updateTimerUI();
    // Play background music on first submission
    if (!musicPlayed) {
      musicPlayed = true;
      bgMusic.play().catch(() => {});
    }
  });

  socket.on('timer:tick', (d) => {
    timeRemaining = d.timeRemaining;
    updateTimerUI();
  });

  socket.on('timer:ended', () => {
    timeRemaining = 0;
    updateTimerUI();
    // All agents get closing lines
    if (idleTimer) clearInterval(idleTimer);
    Object.entries(timerEndLines).forEach(([agent, line], i) => {
      setTimeout(() => showSpeechBubble(agent, line), i * 600);
    });
  });

  socket.on('submission:new', (d) => {
    addFeedItem(d.id, d.text, null);
    addEnvelopeToMailbox();
    resetIdleTimer();
  });

  socket.on('submission:classified', (d) => {
    // Update feed item with classification badge briefly before removal
    addFeedItem(d.id, d.text, d.classification);
    counts[d.classification.swot]++;
    updateCounts();
    // Trigger agent walk animation (which removes from feed)
    triggerDelivery(d.id, d.classification.swot);
  });

  socket.on('speech:bubbles', (d) => {
    d.bubbles.forEach((b, i) => {
      setTimeout(() => showSpeechBubble(b.agent, b.text), i * 800);
    });
  });
}
</script>
</body>
</html>
